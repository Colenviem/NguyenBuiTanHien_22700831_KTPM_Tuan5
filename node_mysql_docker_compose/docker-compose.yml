version: '3.8'

services:
  # Dịch vụ Cơ sở dữ liệu
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: test_db
    ports:
      - "3306:3306"

  # Dịch vụ Node.js
  app:
    build: ./node-app
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - DB_HOST=db