version: '3.8'

services:
  cache-server:
    image: redis:7-alpine
    container_name: my-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: always
    # Thêm các biến môi trường để hỗ trợ Web UI
    environment:
      - RI_HOST=0.0.0.0
      - RI_PORT=8001
    ports:
      - "8001:8001"
    # Đảm bảo container có quyền ghi log/cấu hình
    user: root

volumes:
  redis_data: